name: Build Places Data
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch all places from Kakao
        env:
          KAKAO_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: node scripts/build-places.js
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/places.json
          git diff --staged --quiet || git commit -m "Update places data $(date -u +%Y-%m-%d)"
          git push
